name: Build Xodex ISO

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish this build under (e.g. v0.1.0)"
        required: true
        default: "nightly"

permissions:
  contents: write

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            isolinux \
            syslinux-common

      - name: Build ISO
        run: |
          chmod +x ./scripts/build-xodex.sh
          sudo ./scripts/build-xodex.sh

      - name: Locate built ISO
        id: locate_iso
        run: |
          ISO_PATH=$(find build -maxdepth 1 -name "*.iso" | head -n 1)
          if [ -z "$ISO_PATH" ]; then
            echo "No ISO found in build/ — check build-xodex.sh output above."
            exit 1
          fi
          echo "iso_path=$ISO_PATH" >> "$GITHUB_OUTPUT"
          echo "iso_name=$(basename "$ISO_PATH")" >> "$GITHUB_OUTPUT"

      - name: Generate checksum
        working-directory: build
        run: |
          ISO_NAME="${{ steps.locate_iso.outputs.iso_name }}"
          sha256sum "$ISO_NAME" > "$ISO_NAME.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: xodex-iso
          path: |
            ${{ steps.locate_iso.outputs.iso_path }}
            build/*.sha256
          retention-days: 14

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Xodex ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ steps.tag.outputs.tag == 'nightly' }}
          files: |
            ${{ steps.locate_iso.outputs.iso_path }}
            build/*.sha256
